name: PunishPlugin
version: '1.1'
main: me.pamife.punishPlugin.PunishPlugin
api-version: '1.21'
commands:
  punish:
    description: Opens the punishment menu or punishes manually
    permission: punish.use
  history:
    description: Shows the punishment history of a player
    permission: punish.history
  unpunish:
    description: Lifts an active punishment
    permission: punish.unpunish
  punishlang:
    description: Changes your personal plugin language (en/de)
    permission: punish.use
  warn:
    description: Warns a player. Auto-mutes on 3 warnings.
    permission: punish.use
  punishreload:
    description: Reloads the configuration files.
    permission: punish.admin
  punishnotify:
    description: Toggles staff notifications on or off for you.
    permission: punish.staff
  punishments:
    description: Opens a GUI showing all currently active bans and mutes.
    permission: punish.admin
  report:
    description: Report a player for breaking the rules.
    permission: punish.report
  reports:
    description: Open the active reports GUI.
    permission: punish.staff
  webpanel:
    description: Zeigt den Link zum Web-Dashboard an.
    permission: punish.admin