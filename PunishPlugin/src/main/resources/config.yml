  missing-reason:
    en: "&cPlease provide a reason. Example: /punish Player 5d Hacking"
    de: "&cBitte gib einen Grund an. Beispiel: /punish Spieler 5d Hacking"
  invalid-time:
    en: "&cInvalid time format! Use s, m, h, d, w. Ex: 5d"
    de: "&cUngültiges Zeitformat! Nutze s, m, h, d, w. Bsp: 5d"
