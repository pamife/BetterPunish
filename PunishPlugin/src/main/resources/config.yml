# BetterPunish Configuration
prefix: "&8[&6BetterPunish&8] "
default-language: "en"

messages:
  no-permission:
    en: "&cYou do not have permission to do this!"
    de: "&cDu hast keine Rechte dafür!"
  player-not-found:
    en: "&cPlayer not found."
    de: "&cSpieler nicht gefunden."
