    en: "&cYou have been muted!\n&7Reason: %reason%\n&7Duration: %time%"
    de: "&cDu wurdest gemutet!\n&7Grund: %reason%\n&7Dauer: %time%"
  mute-message:
    en: "&cYou are currently muted and cannot use the chat!"
    de: "&cDu bist momentan aus dem Chat ausgeschlossen (Gemutet)!"
