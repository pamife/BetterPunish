    de: "&aDieser Spieler hat eine saubere Weste!"
  history-header:
    en: "&ePunishment History of &6%player%"
    de: "&eStrafhistorie von &6%player%"
  usage-lang:
    en: "&cUsage: /punishlang <en|de>"
    de: "&cVerwendung: /punishlang <en|de>"
