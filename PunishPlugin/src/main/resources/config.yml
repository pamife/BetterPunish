# BetterPunish Pro - Configuration
# High-Performance Moderation System
prefix: "&8[&bBetterPunish&8] &7"
default-language: "en"

# --- WEB REST API ---
# The web dashboard uses this API to fetch live data.
api:
  enabled: true
  port: 8080
  key: "admin-secret-key" # CHANGE THIS IMMEDIATELY FOR SECURITY!

# --- STORAGE SYSTEM ---
storage:
  type: "sqlite"
  mysql:
    host: "localhost"
    port: 3306
    database: "betterpunish"
    username: "root"
    password: ""

# --- DISCORD INTEGRATION ---
# Send live notifications to your Discord staff channels.
discord:
  webhook-url: "YOUR_DISCORD_WEBHOOK_HERE"

# --- CHAT FILTER SYSTEM ---
chat-filter:
  enabled: true
  auto-warn: true
  anti-spam: true
  caps-detection: true
  flood-cooldown: 1500
  banned-words:
    - "badword1"
    - "anotherserver.com"
    - "regex: \\b(v|b)adw[o0]rd\\b"
  allowed-words:
    - "discord.gg/ourserver"

# --- GUI ITEMS (PUNISHMENTS) ---
gui-items:
  '10':
    material: DIAMOND_SWORD
    type: BAN
    internal-reason: "Hacking"
    name-en: "&cHacking"
    name-de: "&cHacking"
    durations:
      - "30d"
      - "3650d"
    lores-en:
      - "&71st Offense: 30 Days"
      - "&72nd Offense: Permanent"
    lores-de:
      - "&71. Mal: 30 Tage"
      - "&72. Mal: Permanent"
  '11':
    material: TNT
    type: BAN
    internal-reason: "Griefing"
    name-en: "&4Griefing"
    name-de: "&4Griefing"
    durations:
      - "7d"
      - "30d"
    lores-en:
      - "&71st Offense: 7 Days"
      - "&72nd Offense: 30 Days"
    lores-de:
      - "&71. Mal: 7 Tage"
      - "&72. Mal: 30 Tage"
  '12':
    material: SPIDER_EYE
    type: BAN
    internal-reason: "Bug Abuse"
    name-en: "&5Bug Abuse"
    name-de: "&5Bugusing"
    durations:
      - "3d"
      - "14d"
    lores-en:
      - "&71st Offense: 3 Days"
      - "&72nd Offense: 14 Days"
    lores-de:
      - "&71. Mal: 3 Tage"
      - "&72. Mal: 14 Tage"
  '14':
    material: PAPER
    type: MUTE
    internal-reason: "Insulting"
    name-en: "&eInsulting"
    name-de: "&eBeleidigung"
    durations:
      - "1d"
      - "7d"
    lores-en:
      - "&71st Offense: 1 Day Mute"
      - "&72nd Offense: 7 Day Mute"
    lores-de:
      - "&71. Mal: Mute 1 Tag"
      - "&72. Mal: Mute 7 Tage"
  '15':
    material: FEATHER
    type: MUTE
    internal-reason: "Spamming"
    name-en: "&eSpamming"
    name-de: "&eSpam"
    durations:
      - "2h"
      - "1d"
    lores-en:
      - "&71st Offense: 2 Hour Mute"
      - "&72nd Offense: 1 Day Mute"
    lores-de:
      - "&71. Mal: Mute 2 Stunden"
      - "&72. Mal: Mute 1 Tag"
  '16':
    material: NAME_TAG
    type: MUTE
    internal-reason: "Advertising"
    name-en: "&eAdvertising"
    name-de: "&eWerbung"
    durations:
      - "3650d"
    lores-en:
      - "&7Immediate: Permanent Mute"
    lores-de:
      - "&7Sofort: Permanent Mute"

